openapi: 3.1.0
# Added by API Auto Mocking Plugin
info:
  description: This documents the 3 APIs in our microservices which are data collection, data pre-processing and data retrieval for manipulating event datasets.
  version: "1.0.0"
  title: Notiver Data API
  contact:
    email: z5422360@ad.unsw.edu.au
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
tags:
  - name: Data Collection
    description: Collects statistical data and article data
  - name: Data Processing
    description: Processes article data to produce an analysis
  - name: Data Retrieval
    description: Processes statistical and article data and fetches from the db
  - name: General
    description: Base endpoints
paths:
  /:
    get:
      tags:
        - General
      summary: Get homepage
      operationId: homepage
      description: This endpoint fetches the homepage of the microservice.
      responses:
        '200':
          description: Successfully reached the homepage
          content:
            application/json:
              schema:
                type: string
                example: "Welcome to Notiver's homepage!"
        '404':
          description: Page not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /upload-data:
    post:
      tags:
        - Data Collection
      summary: Uploads and process data
      operationId: uploadData
      description: This endpoint takes an Excel file input in the specified format, then parses and uploads it to the configured S3 bucket.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: "Upload an Excel file (.xlsx or .xls) to be processed."
      responses:
        '200':
          description: Successful upload
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "File 'file.xlsx' processed and uploaded successfully!"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collect-data:
    get:
      tags:
        - Data Collection
      summary: Download collected data
      operationId: collectData
      description: This endpoint collects data from the configured S3 bucket for download.
      responses:
        '200':
          description: Successfully collected file for download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              # example: 'download link'

        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /upload-articles:
    post:
      tags:
        - Data Collection
      summary: Uploads and process articles from The Guardian
      operationId: uploadArticles
      description: Pulls articles from the Guardian to upload.
      # requestBody:
      responses:
        '200':
          description: Successful upload
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  message:
                    type: string
                    example: "Articles collected and processed successfully."
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collect-articles:
    post:
      tags:
        - Data Collection
      summary: Trigger dynamic article scraper
      operationId: triggerScraper
      description: Starts an asynchronous web scraping job based on location, timeframe, and category. Returns a job_id used to poll for the completed data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - location
                - timeFrame
                - category
              properties:
                location:
                  type: string
                  example: "Sydney, Australia"
                  description: "The target geographic location."
                timeFrame:
                  type: string
                  example: "5_per_month_1_year"
                  description: "The volume and historical depth of the scrape."
                category:
                  type: string
                  example: "crime"
                  description: "The target news category."
      responses:
        '200':
          description: Successfully queued scraping job
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "processing"
                  job_id:
                    type: string
                    example: "58fd82aa-a353-40a8-bb93-c4dbe703833b"
                  message:
                    type: string
                    example: "Scrape job queued successfully."
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collect-articles/{job_id}:
    get:
      tags:
        - Data Collection
      summary: Check Scrape Job Status
      operationId: checkScrapeStatus
      description: Polls the S3 bucket to see if the asynchronous background scraping job has completed.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier for the SQS scrape job.
      responses:
        '200':
          description: Job status returned (either processing or complete with articles)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "complete"
                  job_id:
                    type: string
                  count:
                    type: integer
                  articles:
                    type: array
                    items:
                      type: object
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /process-articles/{job_id}:
    post:
      tags:
        - Data Processing
      summary: Trigger NLP processing pipeline for a job
      operationId: processArticles
      description: Triggers the internal NLP processing pipeline for a specific job_id. Fetches data from the Collection API, applies NLP, and saves to user's private S3 folder or public pool.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the scraped data to process.
        - name: is_ceims
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: If true, appends the results to the public Community Intelligence Pool.
      responses:
        '200':
          description: Pipeline executed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  processed:
                    type: integer
                    example: 15
                  skipped:
                    type: integer
                    example: 2
                  job_id:
                    type: string
        '500':
          description: Pipeline execution failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /processed-articles/{job_id}:
    get:
      tags:
        - Data Processing
      summary: Retrieve processed articles for a specific job
      operationId: processedArticles
      description: Returns the private processed JSON intelligence report for a specific job_id.
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier for the processed job.
      responses:
        '200':
          description: Successfully retrieved processed articles
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    object_id:
                      type: string
                      example: "9news_article_456"
                    source_type:
                      type: string
                    offence_type:
                      type: string
                    sentiment_score:
                      type: number
                      format: float
                    when:
                      type: string
                      format: date-time
                    suburb:
                      type: string
                    lga:
                      type: string
                    postcode:
                      type: string
        '404':
          description: Processed data not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Fetch error during retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /public/ceims-articles:
    get:
      tags:
        - Data Retrieval
      summary: Get communal CEIMS intelligence
      operationId: getPublicCeimsArticles
      description: Fetches the unified, globally shared CEIMS processed data from the public intelligence pool.
      responses:
        '200':
          description: Successfully retrieved public map data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  count:
                    type: integer
                    example: 87
                  articles:
                    type: array
                    items:
                      type: object
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /run-retrieval:
    post:
      tags:
        - Data Retrieval
      summary: Retrieves and processes data scores to put in DynamoDB
      operationId: runRetrieval
      description: This endpoint fetches processed article data from the Data Processing (NLP), aggregates suburb data into LGA statistics, calculates sentiment and statistical crime scores before finally storing the aggregated data into DynamoDB tables (lga-overall, lga-by-year). 
      responses:
        '200':
          description: Successfully ran pipeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Retrieval pipeline completed successfully"
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /lgas:
    get:
      tags:
        - Data Retrieval
      summary: Get all LGAs
      operationId: getAllLGAs
      description: Retrieves a list of all Local Government Areas stored in the database.
      responses:
        '200':
          description: Successfully retrieved LGAs
          content:
            application/json:
              schema:
                type: object
                properties:
                  lgas:
                    type: array
                    items:
                      type: string
                    example: ["Sydney", "Parramatta", "Blacktown"]
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /lga/{lga}:
    get:
      tags:
        - Data Retrieval
      summary: Get LGA statistics
      operationId: getLGAStats
      description: Retrieves overall statistics for a specified LGA.
      parameters:
        - name: lga
          in: path
          required: true
          schema:
            type: string
          description: Name of the Local Government Area
      responses:
        '200':
          description: Successfully retrieved LGA data
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall:
                    type: object
                    properties:
                      lga:
                        type: string
                      sentiment_score:
                        type: number
                        example: 0.50
                      statistical_score:
                        type: number
                        example: 10.0
                      total_crimes:
                        type: integer
                        example: 520
                      total_articles:
                        type: integer
                        example: 25
        '404':
          description: LGA not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /lga/{lga}/yearly:
    get:
      tags:
        - Data Retrieval
      summary: Get yearly statistics for an LGA
      operationId: getLGAYearlyStats
      description: Retrieves year-by-year crime and sentiment statistics for a specified LGA.
      parameters:
        - name: lga
          in: path
          required: true
          schema:
            type: string
          description: Name of the Local Government Area
      responses:
        '200':
          description: Successfully retrieved yearly data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    year:
                      type: integer
                      example: 2023
                    sentiment:
                      type: number
                    stats:
                      type: number
                    total:
                      type: integer
                    violent:
                      type: integer
                    theft:
                      type: integer
                    property:
                      type: integer
                    drugs:
                      type: integer
                    judicial:
                      type: integer
                    other:
                      type: integer
        '404':
          description: LGA not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: A human-readable error message.