name: SENG3011 Notiver - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pytest pytest-cov ruff boto3 moto

      - name: Run linting
        run: ruff check .

      - name: Test Data Retrieval
        working-directory: ./backend/services/data-retrieval
        run: |
          pip install -r requirements.txt
          python -m pytest --cov=app --cov-report=term-missing

      - name: Test Data Collection
        working-directory: ./backend/services/data-collection
        run: |
          # Only install/test if the files exist, preventing crashes
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -d "tests" ]; then python -m pytest --cov=app --cov-report=term-missing; fi

      - name: Test Data Processing
        working-directory: ./backend/services/data-processing
        run: |
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -d "tests" ]; then python -m pytest --cov=app --cov-report=term-missing; fi

      - name: Upload coverage as HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
  
  deploy-to-aws:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push data-collection image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-data-collection
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend/services/data-collection
          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          aws lambda update-function-code \
            --function-name data-collection-function \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cd ../../..
  
      - name: Build, tag, and push data-processing image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-nlp-processor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend/services/data-processing
          cp ../data-retrieval/utils/SUBURB_TO_LGA_DATA.json ./SUBURB_TO_LGA_DATA.json
          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          aws lambda update-function-code \
            --function-name data-nlp-analytics \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cd ../../..

      - name: Build, tag and push data-retrieval image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-data-retrieval
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend/services/data-retrieval
          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          aws lambda update-function-code \
            --function-name data-retrieval-function \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          cd ../../..
     

  push-to-staging:
    needs: deploy-to-aws
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Update Lambda Aliases to Staging environment
        run: |
          aws lambda update-alias --function-name data-collection-function --name staging --function-version \$LATEST
          aws lambda update-alias --function-name data-nlp-analytics --name staging --function-version \$LATEST
          aws lambda update-alias --function-name data-retrieval-function --name staging --function-version \$LATEST

      - name: Inject AWS Account ID into OpenAPI spec
        run: |
          sed -i "s/\${AWS_ACCOUNT_ID}/${{ secrets.AWS_ACCOUNT_ID }}/g" backend/infrastructure/openapi.yaml

      - name: Deploy API Gateway
        run: |
          aws apigatewayv2 reimport-api \
            --api-id hbjyijsell \
            --body file://backend/infrastructure/openapi.yaml

      - name: Create API Deployment
        run: |
          aws apigatewayv2 create-deployment \
            --api-id hbjyijsell \
            --stage-name staging


      
  push-to-production:
    needs: push-to-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Update from Staging to Production environment
        run: |
          STAGING_VER=$(aws lambda get-alias --function-name data-retrieval-function --name staging --query 'FunctionVersion' --output text)
  
          aws lambda update-alias --function-name data-collection-function --name production --function-version $STAGING_VER
          aws lambda update-alias --function-name data-nlp-analytics --name production --function-version $STAGING_VER
          aws lambda update-alias --function-name data-retrieval-function --name production --function-version $STAGING_VER

      - name: Create API Deployment
        run: |
          aws apigatewayv2 create-deployment \
          --api-id hbjyijsell \
          --stage-name production
