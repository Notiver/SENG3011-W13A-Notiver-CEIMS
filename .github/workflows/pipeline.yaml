name: SENG3011 Notiver - CI/CD Pipeline

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies for PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

      - name: Install dependencies
        run: python -m pip install \
            pytest==7.4.4 \
            pytest-cov==4.1.0 \
            pytest-html==3.2.0 \
            weasyprint ruff boto3 moto

      - name: Run linting
        run: ruff check .

      - name: Test Data Retrieval
        working-directory: ./backend/services/data-retrieval
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/../../
          echo "@page { size: A4 landscape; margin: 1cm; }" > landscape.css
          pip install -r requirements.txt
          python -m pytest --cov=app --cov-report=html --html=report.html --self-contained-html --css=landscape.css
          echo "<h2>Coverage Report</h2>" >> report.html
          cat htmlcov/index.html >> report.html
          python -m weasyprint report.html data-retrieval-report.pdf

      - name: Test Data Collection
        working-directory: ./backend/services/data-collection
        run: |
          # Only install/test if the files exist, preventing crashes
          export PYTHONPATH=$PYTHONPATH:$(pwd)/../../
          echo "@page { size: A4 landscape; margin: 1cm; }" > landscape.css
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -d "tests" ]; then
            python -m pytest --cov=app --cov-report=html --html=report.html --self-contained-html --css=landscape.css
            echo "<h2>Coverage Report</h2>" >> report.html
            cat htmlcov/index.html >> report.html
            python -m weasyprint report.html data-collection-report.pdf
          fi

      - name: Test Data Processing
        working-directory: ./backend/services/data-processing
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/../../
          echo "@page { size: A4 landscape; margin: 1cm; }" > landscape.css
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          if [ -d "tests" ]; then
            python -m pytest --cov=app --cov-report=html --html=report.html --self-contained-html --css=landscape.css
            echo "<h2>Coverage Report</h2>" >> report.html
            cat htmlcov/index.html >> report.html
            python -m weasyprint report.html data-processing-report.pdf
          fi

      - name: Upload All PDF Reports
        uses: actions/upload-artifact@v4
        with:
          name: notiver-test-reports
          if-no-files-found: ignore
          path: |
            backend/services/data-retrieval/data-retrieval-report.pdf
            backend/services/data-collection/data-collection-report.pdf
            backend/services/data-processing/data-processing-report.pdf
  
  deploy-to-aws:
    needs: test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && github.event_name == 'push'
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # - name: Set up Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push data-collection image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-data-collection
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TARGET_STAGE=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          echo "Detected state: $TARGET_STAGE"

          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -f backend/services/data-collection/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          aws lambda update-function-code \
            --function-name data-collection-function \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          aws lambda wait function-updated --function-name data-collection-function

          aws lambda update-alias \
            --function-name data-collection-function \
            --name $TARGET_STAGE \
            --function-version \$LATEST
  
      - name: Build, tag, and push data-processing image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-nlp-processor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TARGET_STAGE=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          echo "Detected state: $TARGET_STAGE"

          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -f backend/services/data-processing/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          aws lambda update-function-code \
            --function-name data-nlp-analytics \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          aws lambda wait function-updated --function-name data-nlp-analytics

          aws lambda update-alias \
            --function-name data-nlp-analytics \
            --name $TARGET_STAGE \
            --function-version \$LATEST

      - name: Build, tag and push data-retrieval image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-data-retrieval
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TARGET_STAGE=${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
          echo "Detected state: $TARGET_STAGE"

          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -f backend/services/data-retrieval/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          aws lambda update-function-code \
            --function-name data-retrieval-function \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          aws lambda wait function-updated --function-name data-retrieval-function

          aws lambda update-alias \
            --function-name data-retrieval-function \
            --name $TARGET_STAGE \
            --function-version \$LATEST
  

  deploy-to-environment:
    needs: deploy-to-aws
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Set Stage Variable
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_STAGE=production" >> $GITHUB_ENV
          else
            echo "TARGET_STAGE=staging" >> $GITHUB_ENV
          fi

      - name: Grant API Gateway permission to invoke Aliases
        run: |
          aws lambda add-permission \
            --function-name data-collection-function \
            --statement-id AllowAPIGatewayInvoke-${TARGET_STAGE} \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "$API_SOURCE_ARN" \
            --qualifier $TARGET_STAGE || true
            
          aws lambda add-permission \
            --function-name data-nlp-analytics \
            --statement-id AllowAPIGatewayInvoke-${TARGET_STAGE} \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "$API_SOURCE_ARN" \
            --qualifier $TARGET_STAGE || true
            
          aws lambda add-permission \
            --function-name data-retrieval-function \
            --statement-id AllowAPIGatewayInvoke-${TARGET_STAGE} \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "$API_SOURCE_ARN" \
            --qualifier $TARGET_STAGE || true

      - name: Inject AWS Account ID into OpenAPI spec
        run: |
          sed -i "s/\${AWS_ACCOUNT_ID}/${{ secrets.AWS_ACCOUNT_ID }}/g" backend/infrastructure/openapi.yaml

      - name: Deploy API Gateway
        run: |
          aws apigatewayv2 reimport-api \
            --api-id hbjyijsell \
            --body file://backend/infrastructure/openapi.yaml

      - name: Create API Deployment
        run: |
          aws apigatewayv2 create-deployment \
            --api-id hbjyijsell \
            --stage-name $TARGET_STAGE


      - name: Install observability dependencies
        if: github.ref == 'refs/heads/main'
        run: |
          pip install -r backend/observability/requirements.txt
          
      - name: Create/Update CloudWatch Dashboard
        if: github.ref == 'refs/heads/main'
        run: |
          aws cloudwatch put-dashboard \
            --dashboard-name Notiver-Dashboard \
            --dashboard-body file://backend/observability/dashboard/dashboard.json

      - name: Create CloudWatch Alarms
        if: github.ref == 'refs/heads/main'
        run: |
          python backend/observability/alerts/alarms.py