name: SENG3011 Notiver - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pytest pytest-cov ruff

      - name: Run linting
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-report=html

      - name: Upload coverage as HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
