name: SENG3011 Notiver - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pytest pytest-cov ruff

      - name: Run linting
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-report=html

      - name: Upload coverage as HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Install and zip collection service
        run: |
          cd backend/services/data-collection
          pip install -r requirements.txt -t app/package/
          cd app
          cp -r main.py api/ database/ services/ utils/ config.py models.py package/
          cd package && zip -r ../deployment.zip .

      - name: Deploy collection Lambda
        run: |
          aws lambda update-function-code \
            --function-name data-collection-function \
            --zip-file fileb://backend/services/data-collection/app/deployment.zip
          
