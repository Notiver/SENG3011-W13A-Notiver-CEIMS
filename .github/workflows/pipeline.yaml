name: SENG3011 Notiver - CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pytest pytest-cov ruff

      - name: Run linting
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-report=html

      - name: Upload coverage as HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Install and zip collection service
        run: |
          cd backend/services/data-collection
          pip install \
            --platform manylinux2014_x86_64 \
            --target app/package/ \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            -r requirements.txt
          cd app
          cp -r main.py api/ database/ services/ utils/ config.py models.py package/
          cd package && zip -r ../deployment.zip .

      - name: Upload collection zip to S3
        run: |
          aws s3 cp backend/services/data-collection/app/deployment.zip \
            s3://notiver-deployment-bucket/collection-deployment.zip

      - name: Deploy collection Lambda from S3
        run: |
          aws lambda update-function-code \
            --function-name data-collection-function \
            --s3-bucket notiver-deployment-bucket \
            --s3-key collection-deployment.zip

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Processing image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-nlp-processor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd backend/services/data-processing
          docker build \
            --provenance=false \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Create or update NLP Lambda
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: notiver-nlp-processor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/service-role/data-nlp-analytics-role-96kjz916"          
          if aws lambda get-function --function-name data-nlp-analytics 2>/dev/null; then
            echo "Function exists. Updating code..."
            aws lambda update-function-code \
              --function-name data-nlp-analytics \
              --image-uri $IMAGE_URI
          else
            echo "Function does not exist. Creating..."
            aws lambda create-function \
              --function-name data-nlp-analytics \
              --package-type Image \
              --code ImageUri=$IMAGE_URI \
              --role $ROLE_ARN \
              --timeout 120 \
              --memory-size 1024
          fi
          
          aws lambda wait function-updated --function-name data-nlp-analytics
